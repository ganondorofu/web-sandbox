<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>8. JavaScript バリデーションを無効化</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="nav"></div>
<h1>8. JavaScript バリデーションを無効化</h1>

<p>「送信前に JS でチェックしているから安全」は誤りです。
その JS は利用者の環境で動くので、止めることも書き換えることもできます。</p>

<div class="demo">
  <form id="form" data-out="out">
    <label>クーポンコード（JSで "VALID" 以外を拒否）</label>
    <input type="text" name="coupon" id="coupon" value="HACK">

    <div class="controls" style="margin-top:.6rem;">
      <button type="submit">通常送信（JS検証あり）</button>
      <button type="button" onclick="killValidator()">① 検証関数を無効化</button>
      <button type="button" onclick="directSend()">② 検証を飛ばして直接送信</button>
    </div>
  </form>
  <div id="out" class="out"></div>
</div>

<div class="note">
<strong>突破の理屈:</strong>
通常送信は <code>onsubmit</code> の検証で止まります。しかし
<code>form.onsubmit=null</code> で検証を外す（①）、
あるいは検証関数を通さず送信処理を直接呼ぶ（②）ことができます。
JS自体を無効化したり、curlで送れば検証は存在しません。
</div>

<h2>正しい対策</h2>
<p>クーポン有効性・在庫・本人確認などはサーバーで検証する。クライアントJSの結果を信用しない。</p>

<script src="../js/common.js"></script>
<script>
  const form = document.getElementById('form');

  // 「JSで頑張った検証」。だが利用者は止められる。
  form.onsubmit = function (e) {
    e.preventDefault();
    const v = document.getElementById('coupon').value;
    if (v !== 'VALID') {
      logLine('out', 'JS検証: 無効なクーポンです。送信を中止しました。', 'warn');
      return false;
    }
    inspect(form, 'out');
  };

  function killValidator() {
    form.onsubmit = null;
    // 検証なしで送ったらモックに流す
    form.addEventListener('submit', function (e) { e.preventDefault(); inspect(form, 'out'); }, { once: true });
    alert('onsubmit を null にしました。次の「通常送信」は検証されません。');
  }

  function directSend() {
    // 攻撃者は検証関数を経由せず、送信処理を直接叩ける
    inspect(form, 'out');
  }
</script>
</body>
</html>
