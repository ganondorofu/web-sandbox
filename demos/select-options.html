<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>6. select の選択肢制限を突破</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="nav"></div>
<h1>6. <code>select</code> の選択肢制限を突破（権限昇格）</h1>

<p>ドロップダウンに「user」と「guest」しか無くても、選択肢は自由に追加・変更できます。
サーバーが「画面に出した選択肢しか来ない」と思い込むと危険です。</p>

<div class="demo">
  <form data-mock data-out="out" id="form">
    <label>付与する権限（画面上は user / guest のみ）</label>
    <select name="role" id="role">
      <option value="user">user</option>
      <option value="guest">guest</option>
    </select>

    <div class="controls" style="margin-top:.6rem;">
      <button type="button" onclick="injectOption()">① admin の選択肢を注入して選択</button>
      <button type="button" onclick="forceValue()">② 既存optionのvalueをsuperadminに書換</button>
      <button type="submit">送信（モック）</button>
    </div>
  </form>
  <div id="out" class="out"></div>
</div>

<div class="note">
<strong>突破の理屈:</strong>
<code>&lt;option&gt;</code> は JS/DevTools で追加でき、value も書き換えられます。
画面に無い <code>admin</code> や <code>superadmin</code> でも送信可能。
curl なら <code>role=admin</code> を直接送るだけです。
</div>

<h2>正しい対策</h2>
<p>サーバー側で許可リスト（user/guestのみ等）と照合し、想定外の値を拒否する。
権限付与は要求者の権限もサーバーで確認する。</p>

<script src="../js/common.js"></script>
<script>
  function injectOption() {
    const sel = document.getElementById('role');
    const opt = document.createElement('option');
    opt.value = 'admin';
    opt.textContent = 'admin (注入)';
    sel.appendChild(opt);
    sel.value = 'admin';
    alert('admin を注入して選択しました。');
  }
  function forceValue() {
    const sel = document.getElementById('role');
    sel.options[0].value = 'superadmin';
    sel.selectedIndex = 0;
    alert('先頭optionのvalueをsuperadminに書き換えました。');
  }
</script>
</body>
</html>
