<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>7. number の min / max を突破</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="nav"></div>
<h1>7. <code>number</code> の <code>min</code> / <code>max</code> を突破</h1>

<p>スピナーやスライダーの <code>min</code>/<code>max</code> は UI 上の目安です。
JS で範囲外の値を代入したり属性を消せば、いくらでも超えられます。</p>

<div class="demo">
  <form data-mock data-out="out" id="form">
    <label>購入数量（min=1, max=5）</label>
    <input type="number" name="qty" id="qty" value="1" min="1" max="5">

    <label>割引率 %（min=0, max=10 のスライダー）</label>
    <input type="range" name="discount" id="discount" value="0" min="0" max="10">
    <span id="dval">0</span>%

    <div class="controls" style="margin-top:.6rem;">
      <button type="button" onclick="overflow()">① 数量を 99999、割引を 100% に</button>
      <button type="button" onclick="removeLimits()">② min/max 属性を削除</button>
      <button type="submit">送信（モック）</button>
    </div>
  </form>
  <div id="out" class="out"></div>
</div>

<div class="note">
<strong>突破の理屈:</strong>
<code>min</code>/<code>max</code> はスピナー操作や検証の範囲指定にすぎません。
<code>input.value=99999</code> で範囲外を代入でき、属性削除でスライダー上限も外せます。
当然 curl では無関係です。
</div>

<h2>正しい対策</h2>
<p>数量・割引などの数値はサーバー側で範囲・在庫・権限を検証してから適用する。</p>

<script src="../js/common.js"></script>
<script>
  const d = document.getElementById('discount');
  d.addEventListener('input', () => document.getElementById('dval').textContent = d.value);

  function overflow() {
    document.getElementById('qty').value = '99999';
    d.value = '100';
    document.getElementById('dval').textContent = '100';
    alert('数量99999・割引100%を代入しました（範囲外）。');
  }
  function removeLimits() {
    ['qty', 'discount'].forEach(id => {
      const el = document.getElementById(id);
      el.removeAttribute('min');
      el.removeAttribute('max');
    });
    alert('min/max を削除しました。');
  }
</script>
</body>
</html>
