<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>9. 禁止ワードフィルタ / textarea maxlength を突破</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="nav"></div>
<h1>9. 禁止ワードフィルタ / <code>textarea</code> maxlength を突破</h1>

<p>投稿フォームでよくある「入力時に禁止ワードを消す」「最大文字数で切る」処理も、
入力イベントを介さずに値を入れれば素通りします。</p>

<div class="demo">
  <form data-mock data-out="out" id="form">
    <label>コメント（入力時に "spam" を伏字化・最大20文字に切り詰め）</label>
    <textarea name="comment" id="comment" maxlength="20" rows="3">hello</textarea>

    <div class="controls" style="margin-top:.6rem;">
      <button type="button" onclick="bypass()">① JSで長文＋禁止ワードを直接代入</button>
      <button type="submit">送信（モック）</button>
    </div>
  </form>
  <div id="out" class="out"></div>
</div>

<div class="note">
<strong>突破の理屈:</strong>
フィルタは <code>input</code> イベント中に文字列を加工しているだけ。
JS で <code>textarea.value = ...</code> と代入すれば <code>input</code> は発火せず、
<code>maxlength</code> も適用されないため、長文も禁止ワードもそのまま残ります。
</div>

<h2>正しい対策</h2>
<p>NGワード除去・文字数制限・サニタイズはサーバー側で行い、保存・表示時にもエスケープする。</p>

<script src="../js/common.js"></script>
<script>
  const ta = document.getElementById('comment');

  // 入力時フィルタ: spam を伏字化（手入力には効くが…）
  ta.addEventListener('input', () => {
    ta.value = ta.value.replace(/spam/gi, '****');
  });

  function bypass() {
    // input イベントを経由しないので、フィルタも maxlength も無視される
    ta.value = 'これは長い文章です。禁止ワード spam を含み、20文字をはるかに超えています。';
    logLine('out', 'JSで直接代入しました。spam も長文もそのまま残ります。', 'warn');
  }
</script>
</body>
</html>
